<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <img src="assets/logo.svg" alt="Logo" class="logo" />
    <nav>
      <a href="index.html">Inicio</a>
      <a href="about.html">Acerca de</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <main class="container">
    <h1>Dashboard estático</h1>

    <section class="metrics">
      <article class="metric">
        <span class="metric-value">24</span>
        <span class="metric-label">Servicios</span>
      </article>

      <article class="metric">
        <span class="metric-value">98%</span>
        <span class="metric-label">Disponibilidad</span>
      </article>

      <article class="metric">
        <span class="metric-value">12ms</span>
        <span class="metric-label">Latencia media</span>
      </article>
    </section>

    <section class="panel">
      <h2>Estado del sistema</h2>
      <table>
        <thead>
          <tr>
            <th>Componente</th>
            <th>Estado</th>
            <th>Última revisión</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Apache</td>
            <td><span class="status ok">Operativo</span></td>
            <td>2026-06-02</td>
          </tr>
          <tr>
            <td>Docker</td>
            <td><span class="status ok">Operativo</span></td>
            <td>2026-06-02</td>
          </tr>
          <tr>
            <td>GitHub sync</td>
            <td><span class="status warn">Manual</span></td>
            <td>2026-06-02</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 - Mi sitio HTML</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
